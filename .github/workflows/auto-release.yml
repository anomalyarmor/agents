name: "Auto-release armor-mcp on version bump"

# Fires when a push to main changes any of the files that declare the
# armor-mcp / plugin version. Creates the matching tag + GitHub release,
# which triggers publish-pypi.yml (which runs on `release.types: [published]`)
# to publish armor-mcp to PyPI. Releasing is now a side effect of merging a
# version bump, not a separate manual step.
#
# Convention: tag `v<version>`, release title `v<version>` — matches every
# prior release on this repo.
#
# Guardrails:
#   - Relies on scripts/check-versions.py (already in CI) to catch mismatches
#     between armor-mcp/pyproject.toml, armor-mcp/server.json, and
#     .claude-plugin/marketplace.json. If those disagree, the publish-pypi.yml
#     `check-versions` job fails and no PyPI upload happens.
#   - Skips silently if a release for this version already exists — re-merges
#     of the same version are not an error.

on:
  push:
    branches: [main]
    paths:
      - "armor-mcp/pyproject.toml"
      - "armor-mcp/server.json"
      - ".claude-plugin/marketplace.json"

concurrency:
  group: auto-release-armor-mcp
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag and release armor-mcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cross-check version consistency
        run: python scripts/check-versions.py

      - name: Resolve version and tag
        id: version
        run: |
          set -euo pipefail
          version=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('armor-mcp/pyproject.toml').read_text())['project']['version'])")
          if [ -z "$version" ]; then
            echo "::error::Could not extract version from armor-mcp/pyproject.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create release if not already present
        # TAG / TARGET ride through `env:` rather than inline `${{ }}` in
        # the shell body so a malicious version string containing shell
        # metacharacters (e.g. `$(...)`) can't execute. Actions textually
        # substitutes `${{ }}` before the shell runs; env substitution
        # happens inside the shell process and is not re-parsed.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          # Pin the tag to the SHA that triggered this workflow, not to
          # whatever `main` looks like when `gh release create` happens to
          # run. Without this, a commit that lands on `main` between
          # trigger and release creation would pull the tag to a newer
          # commit, and publish-pypi.yml would then build from that later
          # state instead of the intended version bump.
          TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          # `gh release create` is atomic: it creates the tag (at the SHA
          # passed via --target) and the release in one API call. Letting
          # gh own both makes this self-healing: a retried run with the tag
          # already present reuses it rather than failing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" \
            --target "$TARGET" \
            --title "$TAG" \
            --generate-notes
          echo "::notice::Released $TAG at $TARGET; publish-pypi.yml should now fire and push to PyPI."
